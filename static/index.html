<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Pi Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 {
            font-size: 1.2em;
            color: #4ecca3;
        }
        header .status {
            font-size: 0.8em;
            color: #888;
        }
        header .status.online { color: #4ecca3; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.agent {
            align-self: flex-start;
            background: #1f4068;
            color: #ddd;
            border-bottom-left-radius: 4px;
        }
        .message.agent .tool-call {
            font-size: 0.8em;
            color: #4ecca3;
            margin: 4px 0;
        }
        .message.error {
            align-self: center;
            background: #4a1942;
            color: #ff6b6b;
            font-size: 0.9em;
        }
        .message.system {
            align-self: center;
            color: #888;
            font-size: 0.85em;
            padding: 6px;
        }
        .input-area {
            background: #16213e;
            padding: 16px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1em;
            outline: none;
        }
        .input-area input:focus {
            border-color: #4ecca3;
        }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #4ecca3;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
        }
        .input-area button:hover { background: #3dbb94; }
        .input-area button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .typing {
            align-self: flex-start;
            color: #4ecca3;
            font-size: 0.9em;
            padding: 8px 16px;
        }
        .typing::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .quick-actions {
            padding: 8px 20px;
            background: #16213e;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .quick-actions button {
            padding: 6px 12px;
            border: 1px solid #0f3460;
            border-radius: 16px;
            background: transparent;
            color: #4ecca3;
            font-size: 0.8em;
            cursor: pointer;
        }
        .quick-actions button:hover {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Atomic Pi Agent</h1>
        <span class="status" id="status">connecting...</span>
    </header>

    <div class="quick-actions">
        <button onclick="send('What do you see?')">📷 Look</button>
        <button onclick="send('What direction am I facing?')">🧭 Heading</button>
        <button onclick="send('Blink both LEDs')">💡 Blink</button>
        <button onclick="send('Is the board moving?')">🏃 Motion</button>
        <button onclick="send('What time is it?')">🕐 Time</button>
        <button onclick="send('Tell me system info')">💻 System</button>
        <button onclick="send('Say hello out loud')">🔊 Speak</button>
        <button onclick="send('Take a photo and describe it in detail')">👁️ Describe</button>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Type a command..." autofocus>
        <button id="sendBtn" onclick="sendInput()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        // Command history
        let history = JSON.parse(localStorage.getItem('atomicpi_history') || '[]');
        let historyIndex = -1;

        // Check health on load
        fetch('/health')
            .then(r => r.json())
            .then(d => {
                status.textContent = `● ${d.hostname} (online)`;
                status.classList.add('online');
            })
            .catch(() => {
                status.textContent = '● offline';
            });

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.textContent = 'Thinking';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function send(message) {
            if (!message.trim()) return;

            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                hideTyping();
                const data = await res.json();

                if (data.error) {
                    addMessage(data.error, 'error');
                } else {
                    addMessage(data.response, 'agent');
                }
            } catch (err) {
                hideTyping();
                addMessage(`Connection error: ${err.message}`, 'error');
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function sendInput() {
            const msg = input.value.trim();
            if (msg) {
                history.unshift(msg);
                if (history.length > 50) history.pop();
                localStorage.setItem('atomicpi_history', JSON.stringify(history));
                historyIndex = -1;
            }
            send(input.value);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendInput();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    input.value = history[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = history[historyIndex];
                } else {
                    historyIndex = -1;
                    input.value = '';
                }
            }
        });

        // Welcome message
        addMessage('Agent online. What would you like me to do?', 'system');
    </script>
</body>
</html>
