<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Pi Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 {
            font-size: 1.2em;
            color: #4ecca3;
        }
        header .status {
            font-size: 0.8em;
            color: #888;
        }
        header .status.online { color: #4ecca3; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.agent {
            align-self: flex-start;
            background: #1f4068;
            color: #ddd;
            border-bottom-left-radius: 4px;
        }
        .message.agent .tool-call {
            font-size: 0.8em;
            color: #4ecca3;
            margin: 4px 0;
        }
        .message.error {
            align-self: center;
            background: #4a1942;
            color: #ff6b6b;
            font-size: 0.9em;
        }
        .message.system {
            align-self: center;
            color: #888;
            font-size: 0.85em;
            padding: 6px;
        }
        .input-area {
            background: #16213e;
            padding: 16px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1em;
            outline: none;
        }
        .input-area input:focus {
            border-color: #4ecca3;
        }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #4ecca3;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
        }
        .input-area button:hover { background: #3dbb94; }
        .input-area button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .typing {
            align-self: flex-start;
            color: #4ecca3;
            font-size: 0.9em;
            padding: 8px 16px;
        }
        .typing::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .quick-actions {
            padding: 8px 20px;
            background: #16213e;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .quick-actions button {
            padding: 6px 12px;
            border: 1px solid #0f3460;
            border-radius: 16px;
            background: transparent;
            color: #4ecca3;
            font-size: 0.8em;
            cursor: pointer;
        }
        .quick-actions button:hover {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Atomic Pi Agent</h1>
        <span class="status" id="status">connecting...</span>
    </header>

    <div class="quick-actions">
        <button onclick="send('What do you see?')">📷 Look</button>
        <button onclick="send('What direction am I facing?')">🧭 Heading</button>
        <button onclick="send('Blink both LEDs')">💡 Blink</button>
        <button onclick="send('Is the board moving?')">🏃 Motion</button>
        <button onclick="send('What time is it?')">🕐 Time</button>
        <button onclick="send('Tell me system info')">💻 System</button>
        <button onclick="send('Say hello out loud')">🔊 Speak</button>
        <button onclick="send('Take a photo and describe it in detail')">👁️ Describe</button>
        <button onclick="send('What do you remember?')">🧠 Memory</button>
        <button onclick="clearMemory()">🗑️ Clear Memory</button>
        <button onclick="changeApiToken()">🔑 API Token</button>
        <button onclick="restartService()">♻️ Restart Service</button>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Type a command..." autofocus>
        <button id="sendBtn" onclick="sendInput()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        // Command history
        let history = JSON.parse(localStorage.getItem('atomicpi_history') || '[]');
        let historyIndex = -1;
        let apiToken = localStorage.getItem('atomicpi_api_token') || '';

        function acceptPairingToken() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const pairingToken = fragment.get('pair');
            if (!pairingToken) return;

            apiToken = pairingToken.trim();
            if (apiToken) {
                localStorage.setItem('atomicpi_api_token', apiToken);
                addMessage('This device is now paired with the Atomic Pi.', 'system');
            }

            // URL fragments are not sent to the server. Remove the secret from
            // the visible URL and browser history immediately after importing it.
            window.history.replaceState(
                null,
                document.title,
                window.location.pathname + window.location.search
            );
        }

        function changeApiToken() {
            const value = prompt('Enter the API token from /etc/atomicpi-agent.env:', apiToken);
            if (value === null) return false;
            apiToken = value.trim();
            if (apiToken) {
                localStorage.setItem('atomicpi_api_token', apiToken);
            } else {
                localStorage.removeItem('atomicpi_api_token');
            }
            return Boolean(apiToken);
        }

        function authHeaders() {
            if (!apiToken && !changeApiToken()) {
                throw new Error('An API token is required.');
            }
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiToken}`
            };
        }

        // Check health on load
        fetch('/health')
            .then(r => r.json())
            .then(d => {
                status.textContent = `● ${d.hostname} (online)`;
                status.classList.add('online');
            })
            .catch(() => {
                status.textContent = '● offline';
            });

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.textContent = 'Thinking';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function send(message) {
            if (!message.trim()) return;

            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 120000); // 2 min timeout

                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ message }),
                    signal: controller.signal
                });

                clearTimeout(timeout);
                hideTyping();
                const data = await res.json();

                if (res.status === 401) {
                    localStorage.removeItem('atomicpi_api_token');
                    apiToken = '';
                }
                if (data.error) {
                    addMessage(data.error, 'error');
                } else {
                    addMessage(data.response, 'agent');
                }
            } catch (err) {
                hideTyping();
                if (err.name === 'AbortError') {
                    addMessage('Request timed out (2 min). The agent may still be processing.', 'error');
                } else {
                    addMessage(`Connection error: ${err.message}`, 'error');
                }
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function sendInput() {
            const msg = input.value.trim();
            if (msg) {
                history.unshift(msg);
                if (history.length > 50) history.pop();
                localStorage.setItem('atomicpi_history', JSON.stringify(history));
                historyIndex = -1;
            }
            send(input.value);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendInput();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    input.value = history[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = history[historyIndex];
                } else {
                    historyIndex = -1;
                    input.value = '';
                }
            }
        });

        // Welcome message and optional one-scan mobile pairing.
        addMessage('Agent online. What would you like me to do?', 'system');
        acceptPairingToken();

        async function clearMemory() {
            if (!confirm('Clear all agent memory? This cannot be undone.')) return;
            try {
                const res = await fetch('/memory', {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                addMessage('Memory cleared.', 'system');
            } catch (err) {
                addMessage(`Could not clear memory: ${err.message}`, 'error');
            }
        }

        async function restartService() {
            if (!confirm('Restart the Atomic Pi agent service?')) return;
            try {
                const res = await fetch('/restart', {
                    method: 'POST',
                    headers: authHeaders()
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                addMessage(data.message, 'system');
                status.textContent = '● restarting';
                status.classList.remove('online');
                setTimeout(() => window.location.reload(), 7000);
            } catch (err) {
                addMessage(`Could not restart service: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
